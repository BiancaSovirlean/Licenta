<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacienti cu bronsiectazii</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 0 16px;
      }
      h1 {
        color: #2c3e50;
      }
      form {
        display: grid;
        gap: 10px;
        background: #f5f7fa;
        padding: 16px;
        border-radius: 8px;
      }
      label {
        display: flex;
        flex-direction: column;
        font-size: 14px;
      }
      input,
      select {
        padding: 6px;
        margin-top: 4px;
      }
      button {
        padding: 8px 16px;
        background: #27ae60;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 6px;
        font-size: 13px;
        text-align: left;
      }
      th {
        background: #eef;
      }
    </style>
  </head>
  <body>
    <!-- React isi va monta tot continutul in acest div gol -->
    <div id="root"></div>
    <!-- punctul de pornire al aplicatiei React -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
